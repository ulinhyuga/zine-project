<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cassette Cover Generator</title>

<style>

body{
background:#070707;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
}

/* glass panel */

.panel{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;
padding:25px;
width:500px;
text-align:center;
}

/* glass button */

button{
padding:10px 18px;
margin:5px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.08);
color:white;
cursor:pointer;
transition:0.25s;
}

button:hover{
background:rgba(255,255,255,0.18);
transform:translateY(-2px);
}

input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.08);
color:white;
margin-bottom:10px;
}

canvas{
margin-top:20px;
background:white;
border-radius:8px;
}

/* cassette preview */

.cassette{
margin-top:20px;
width:320px;
height:200px;
background:#222;
border-radius:12px;
position:relative;
transform:perspective(800px) rotateX(10deg);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.cassette img{
position:absolute;
top:20px;
left:20px;
width:120px;
height:120px;
object-fit:cover;
}

</style>

</head>
<body>

<div class="panel">

<h2>Cassette Generator</h2>

<input id="link" placeholder="Paste Spotify / Bandcamp album link">

<button onclick="fetchAlbum()">Load Album</button>

<input type="file" id="uploadCover">

<button onclick="generate()">Generate J-Card</button>

<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div class="cassette">
<img id="previewCover">
</div>

<canvas id="jcard" width="1200" height="450"></canvas>

<script>

let tracks=[]
let cover=""
let textX=400
let textY=80
let dragging=false

document.getElementById("uploadCover").addEventListener("change",function(e){

let reader=new FileReader()

reader.onload=function(ev){
cover=ev.target.result
document.getElementById("previewCover").src=cover
}

reader.readAsDataURL(e.target.files[0])

})

async function fetchAlbum(){

let url=document.getElementById("link").value

alert("Spotify/Bandcamp API parser bisa ditambahkan di sini")

}

function generate(){

let canvas=document.getElementById("jcard")
let ctx=canvas.getContext("2d")

ctx.fillStyle="#fff"
ctx.fillRect(0,0,canvas.width,canvas.height)

let img=new Image()

img.onload=function(){

ctx.drawImage(img,0,0,350,350)

ctx.fillStyle="#000"
ctx.font="bold 24px Arial"
ctx.fillText("ALBUM TITLE",textX,textY)

let sideA=tracks.slice(0,Math.ceil(tracks.length/2))
let sideB=tracks.slice(Math.ceil(tracks.length/2))

ctx.font="16px Arial"

sideA.forEach((t,i)=>{
ctx.fillText((i+1)+". "+t,380,120+i*20)
})

sideB.forEach((t,i)=>{
ctx.fillText((i+1)+". "+t,700,120+i*20)
})

}

img.src=cover

}

let canvas=document.getElementById("jcard")

canvas.addEventListener("mousedown",function(e){
dragging=true
})

canvas.addEventListener("mouseup",function(){
dragging=false
})

canvas.addEventListener("mousemove",function(e){

if(dragging){

textX=e.offsetX
textY=e.offsetY

generate()

}

})

function downloadPNG(){

let canvas=document.getElementById("jcard")

let link=document.createElement("a")
link.download="cassette.png"
link.href=canvas.toDataURL()

link.click()

}

function downloadPDF(){

let canvas=document.getElementById("jcard")

let img=canvas.toDataURL("image/png")

let win=window.open("")

win.document.write("<img src='"+img+"' style='width:100%'>")

}

</script>

</body>
</html>
