<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIY Cassette J-Card Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Oswald&family=Courier+Prime&display=swap" rel="stylesheet">

<style>

body{
background:#0f0f0f;
color:white;
font-family:Montserrat;
text-align:center;
padding:40px;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-bottom:25px;
}

input, textarea, select{
padding:8px;
border-radius:6px;
border:none;
}

textarea{
width:220px;
height:90px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:white;
cursor:pointer;
}

/* ===== J CARD CANVAS ===== /

#jcard{

width:1747px;
height:1100px;

display:grid;
grid-template-columns:
144px
763px
90px
750px;

margin:auto;
position:relative;

background:#222;
border:3px solid #aaa;

}

/ panel /

.panel{
position:relative;
overflow:hidden;
border-right:2px dashed #777;
}

.panel img{
width:100%;
height:100%;
object-fit:cover;
}

/ text /

#frontText{

position:absolute;
bottom:40px;
left:40px;
font-size:48px;

}

#trackText{

position:absolute;
top:40px;
left:40px;
font-size:30px;
white-space:pre-line;
text-align:left;

}

#spineText{

writing-mode:vertical-rl;
text-orientation:mixed;

font-size:40px;
font-weight:bold;

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

}

/ guides /

.fold{

position:absolute;
top:0;
bottom:0;
width:3px;
background:yellow;
opacity:.7;

}

.cut{

position:absolute;
left:0;
right:0;
height:3px;
background:red;
opacity:.6;

}

.topCut{
top:-3px;
}

.bottomCut{
bottom:-3px;
}

</style>
</head>

<body>

<h2>DIY Cassette J-Card Generator</h2>

<div class="controls">

<input type="file" id="frontUpload">
<input type="file" id="backUpload">
<input type="file" id="insideUpload">

<input type="text" id="bandName" placeholder="Band Name">

<textarea id="tracklist" placeholder="Tracklist"></textarea>

<select id="fontSelect">
<option value="Montserrat">Montserrat</option>
<option value="Oswald">Oswald</option>
<option value="Courier Prime">Courier</option>
</select>

<input type="color" id="fontColor" value="#ffffff">

<button id="downloadBtn">Download PNG</button>

</div>

<div id="jcard">

<div class="cut topCut"></div>
<div class="cut bottomCut"></div>

<div class="panel flap"></div>

<div class="panel inside">
<img id="insideImg">
</div>

<div class="panel spine">
<div id="spineText">Band</div>
</div>

<div class="panel front">
<img id="frontImg">
<div id="frontText">Band</div>
</div>

<div class="panel back">
<img id="backImg">
<div id="trackText"></div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

/ upload image /

function upload(input,img){

input.onchange=e=>{

let reader=new FileReader()

reader.onload=a=>img.src=a.target.result

reader.readAsDataURL(e.target.files[0])

}

}

upload(frontUpload,frontImg)
upload(backUpload,backImg)
upload(insideUpload,insideImg)

/ text edit /

bandName.oninput=()=>{

frontText.innerText=bandName.value
spineText.innerText=bandName.value

}

tracklist.oninput=()=>{

trackText.innerText=tracklist.value

}

/ font /

function applyStyle(){

let font=fontSelect.value
let color=fontColor.value

frontText.style.fontFamily=font
spineText.style.fontFamily=font
trackText.style.fontFamily=font

frontText.style.color=color
spineText.style.color=color
trackText.style.color=color

}

fontSelect.onchange=applyStyle
fontColor.onchange=applyStyle

/ download */

downloadBtn.onclick=()=>{

html2canvas(document.getElementById("jcard")).then(canvas=>{

let link=document.createElement("a")

link.download="cassette-jcard.png"

link.href=canvas.toDataURL()

link.click()

})

}

</script>

</body>
</html>
